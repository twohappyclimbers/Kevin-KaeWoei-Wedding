<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Kevin & Kae Woei</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #efe6d8;
    font-family: "Playfair Display", serif;
    color: #3b2f2f;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px 0;
}

.card {
    background: #f5efe6;
    width: 90%;
    max-width: 600px;
    padding: 50px 30px;
    text-align: center;
    border: 1px solid #d8cfc2;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

.names {
    font-family: "Great Vibes", cursive;
    font-size: 42px;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 14px;
    letter-spacing: 1px;
}

.divider {
    width: 60px;
    height: 1px;
    background: #c7b8a3;
    margin: 20px auto 30px;
}

/* Gallery grid */
.gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

.gallery img {
    width: 100%;
    height: auto;
    border-radius: 8px;
    transition: transform 0.3s ease;
    cursor: pointer;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* Back button */
.back-button {
    position: fixed;
    top: 20px;
    left: 20px;
    text-decoration: none;
    font-size: 14px;
    color: #3b2f2f;
    border: 1px solid #3b2f2f;
    padding: 6px 12px;
    background: #f5efe6;
}

</style>
</head>

<body>

<div class="names">Kevin & Kae Woei</div>
<div class="subtitle">Our Moments</div>

</div>

</div>
